<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Dashboard – together-to-the-top</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Supabase REST API (no SDK needed) -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --ac: #2563eb;
      --bg: #f8fafc;
      --bg2: #fff;
      --bd: #e2e8f0;
      --tx: #0f172a;
      --tx2: #64748b;
      --danger: #dc2626;
      --warn: #ea580c;
      --ok: #059669
    }

    body {
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh
    }

    input,
    select,
    button {
      font-family: inherit
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .fade-in {
      animation: fadeIn .3s ease-out
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(37, 99, 235, .2);
      border-top-color: var(--ac);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block
    }

    ::-webkit-scrollbar {
      height: 6px;
      width: 6px
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 99px
    }

    [data-dark="true"] {
      --ac: #60a5fa;
      --bg: #0f172a;
      --bg2: #1e293b;
      --bd: #334155;
      --tx: #f1f5f9;
      --tx2: #94a3b8;
      --danger: #f87171;
      --warn: #fb923c;
      --ok: #34d399
    }

    [data-dark="true"] .dark-card {
      background: #1e293b !important;
      border-color: #334155 !important
    }

    [data-dark="true"] input,
    [data-dark="true"] select {
      background: #1e293b !important;
      color: #f1f5f9 !important;
      border-color: #475569 !important
    }

    [data-dark="true"] table {
      color: #e2e8f0
    }

    [data-dark="true"] table thead th {
      background: #1e293b !important;
      color: #94a3b8 !important
    }

    [data-dark="true"] table tbody td {
      background: #0f172a !important;
      border-color: #1e293b !important
    }

    @media(max-width:768px) {
      body {
        font-size: 13px
      }

      table {
        font-size: 10px !important
      }

      table th,
      table td {
        padding: 3px 2px !important
      }

      .fade-in {
        animation: none
      }

      .mob-hdr-actions {
        flex-wrap: wrap;
        gap: 4px !important
      }

      .mob-hdr-user {
        display: none !important
      }

      .mob-sidebar {
        display: none !important
      }

      .mob-sidebar.mob-show {
        display: block !important
      }

      .mob-profile-wrap {
        flex-direction: column !important
      }

      .mob-toggle-sb {
        display: flex !important
      }
    }

    @media(min-width:769px) {
      .mob-toggle-sb {
        display: none !important
      }
    }

    @media(max-width:480px) {
      table th div[style*="writing-mode"] {
        max-height: 60px !important;
        font-size: 7px !important
      }
    }

    .cluster-scroll {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch
    }

    .cluster-scroll::-webkit-scrollbar {
      height: 3px
    }

    .cluster-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 99px
    }
  </style>
</head>

      pos_bar: [{ de: "Bestelleingabe fehlerfrei", vn: "Nhập order không lỗi" }, { de: "Split-Billing korrekt", vn: "Tách bill đúng" }, { de: "Tagesabschluss vollständig durchgeführt", vn: "Kết ca đầy đủ" }, { de: "Fehlkorrekturen sauber dokumentiert", vn: "Sửa lỗi có ghi chép rõ" }],
      bartechniken: [{ de: "Shake/Stir-Entscheidung korrekt", vn: "Quyết định lắc/khuấy đúng" }, { de: "Jigger-Maße präzise", vn: "Đo Jigger chính xác" }, { de: "Glas sauber und passend", vn: "Ly sạch và phù hợp" }, { de: "Garnitur ordentlich angefügt", vn: "Gắn trang trí gọn đẹp" }],
      cocktail_klassiker: [{ de: "Originalrezept korrekt reproduziert", vn: "Tái tạo đúng công thức gốc" }, { de: "Serviert in korrekt temperiertem Glas", vn: "Phục vụ trong ly đúng nhiệt độ" }, { de: "Garnitur entspricht Klassiker-Standard", vn: "Trang trí đúng tiêu chuẩn" }, { de: "Gast wurden Zutaten erläutert", vn: "Giải thích thành phần cho khách" }],
      tisch_setup: [{ de: "Stäbchen auf Hashi-Oki korrekt platziert", vn: "Đũa đặt đúng trên gác đũa" }, { de: "Shoyu-Schälchen sauber und positioniert", vn: "Chén Shoyu sạch và đúng vị trí" }, { de: "Tisch abgewischt und sauber übergeben", vn: "Bàn lau sạch và bàn giao đúng" }, { de: "Stühle gerade gestellt", vn: "Ghế sắp thẳng" }],
      kassieren: [{ de: "Wechselgeld korrekt berechnet und ausgegeben", vn: "Trả tiền thừa đúng" }, { de: "Kartenrechnungen fehlerfrei", vn: "Thanh toán thẻ không lỗi" }, { de: "Split ordnungsgemäß durchgeführt", vn: "Tách bill đúng quy trình" }, { de: "Bon dem Gast korrekt übergeben", vn: "Trao bill đúng cho khách" }],
      reklamationsmanagement: [{ de: "Beschwerde ruhig und empathisch aufgenommen", vn: "Tiếp nhận khiếu nại bình tĩnh và đồng cảm" }, { de: "Lösung schnell und passend angeboten", vn: "Đưa ra giải pháp nhanh và phù hợp" }, { de: "Eskalation vermieden", vn: "Không để leo thang" }, { de: "Gast zufrieden entlassen", vn: "Khách ra về hài lòng" }],
      getraenkekalkulation: [{ de: "Wareneinsatz korrekt berechnet", vn: "Tính chi phí nguyên liệu đúng" }, { de: "Verkaufspreis korrekt kalkuliert", vn: "Tính giá bán đúng" }, { de: "MwSt korrekt aufgeschlagen", vn: "Cộng thuế VAT đúng" }, { de: "Deckungsbeitrag bekannt und kommuniziert", vn: "Nắm và có thể giải thích lợi nhuận đóng góp" }],
      jugendschutz: [{ de: "Altersgrenze bekannt (16/18 Jahre)", vn: "Biết giới hạn tuổi (16/18)" }, { de: "ID-Kontrolle konsequent durchgeführt", vn: "Kiểm tra giấy tờ nhất quán" }, { de: "Ablehnung höflich aber bestimmt", vn: "Từ chối lịch sự nhưng kiên quyết" }, { de: "Risiken für das Restaurant bekannt", vn: "Biết rủi ro cho nhà hàng" }],
      haccp_bar: [{ de: "Allergene auf der Karte korrekt ausgewiesen", vn: "Dị ứng nguyên trên menu ghi đúng" }, { de: "HSD-Kontrolle durchgeführt", vn: "Đã kiểm tra hạn sử dụng" }, { de: "Eis-Maschine gereinigt", vn: "Vệ sinh máy đá" }, { de: "Kühlung geprüft (4–7°C)", vn: "Kiểm tra nhiệt độ làm lạnh (4–7°C)" }],
      gasteberatung: [{ de: "Gastwünsche aktiv erfragt", vn: "Chủ động hỏi sở thích khách" }, { de: "Passende Empfehlung gegeben", vn: "Đề xuất phù hợp" }, { de: "Upselling einmal freundlich versucht", vn: "Thử upselling một lần lịch sự" }, { de: "Gast zufrieden mit Auswahl", vn: "Khách hài lòng với lựa chọn" }],
      gastfreundschaft: [{ de: "Gast bei Ankunft begrüßt (< 30 Sek.)", vn: "Chào đón khách khi đến (< 30 giây)" }, { de: "Blickkontakt und Lächeln", vn: "Giao tiếp bằng mắt và mỉm cười" }, { de: "Gast beim Gehen verabschiedet", vn: "Chào tạm biệt khi khách đi" }, { de: "Positive Atmosphäre geschaffen", vn: "Tạo bầu không khí tích cực" }],
      stressresistenz: [{ de: "Ruhig geblieben unter Druck", vn: "Giữ bình tĩnh dưới áp lực" }, { de: "Prioritäten korrekt gesetzt", vn: "Đặt ưu tiên đúng" }, { de: "Team kommuniziert bei Überlastung", vn: "Thông báo cho team khi quá tải" }, { de: "Fehler unter Stress vermieden oder schnell korrigiert", vn: "Tránh lỗi hoặc sửa nhanh khi stress" }]
    };

    function getQuizQuestions(subId, lang) {
      const pool = QUIZ[subId];
      if (!pool) return [];
      // Shuffle and pick 3
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, Math.min(3, shuffled.length));
    }

    function calcLevel(quizPct, checkPct) {
      const total = quizPct * 0.4 + checkPct * 0.6;
      if (total >= 90) return 4;
      if (total >= 75) return 3;
      if (total >= 55) return 2;
      if (total >= 35) return 1;
      return 0;
    }

    const LEVEL_META = {
      0: { l: "—", c: "#94a3b8", emoji: "⬜" },
      1: { l: "Junior", c: "#fbbf24", emoji: "🟡" },
      2: { l: "Advanced", c: "#34d399", emoji: "🟢" },
      3: { l: "Expert", c: "#22d3ee", emoji: "🔵" },
      4: { l: "Master", c: "#a78bfa", emoji: "🟣" }
    };

    // Assessment component
    function AssessTab({ emps, cu, myE, role, lang, uSk, dark }) {
      const [step, setStep] = React.useState("select"); // select | quiz | check | result
      const [selSub, setSelSub] = React.useState("");
      const [selCluster, setSelCluster] = React.useState("sushi_cold");
      const [questions, setQuestions] = React.useState([]);
      const [qIdx, setQIdx] = React.useState(0);
      const [answers, setAnswers] = React.useState([]);
      const [checkItems, setCheckItems] = React.useState([]);
      const [saving, setSaving] = React.useState(false);
      const [saved, setSaved] = React.useState(false);
      const [note, setNote] = React.useState("");
      const t = TX[lang];
      const isL = lang === 'vn';

      // For self-role: preselect their profile
      const targetEmpId = (role === "self") ? myE : null;
      const [selectedEmpId, setSelectedEmpId] = React.useState(targetEmpId || "");
      const targetEmp = emps.find(e => e.id === selectedEmpId);

      const sub = selSub ? SM[selSub] : null;
      const hasQuiz = selSub && QUIZ[selSub] && QUIZ[selSub].length > 0;
      const hasCheck = selSub && CHECKLIST[selSub] && CHECKLIST[selSub].length > 0;

      function startAssessment() {
        if (!selSub || !selectedEmpId) return;
        const qs = getQuizQuestions(selSub, lang);
        setQuestions(qs);
        setAnswers(new Array(qs.length).fill(null));
        const cl = (CHECKLIST[selSub] || []).map(i => ({ ...i, checked: false }));
        setCheckItems(cl);
        setQIdx(0);
        setNote("");
        setSaved(false);
        if (qs.length > 0) setStep("quiz");
        else if (cl.length > 0) setStep("check");
        else setStep("result");
      }

      function answerQ(idx) {
        const newA = [...answers];
        newA[qIdx] = idx;
        setAnswers(newA);
      }

      function nextQ() {
        if (qIdx < questions.length - 1) setQIdx(qIdx + 1);
        else {
          if (checkItems.length > 0) setStep("check");
          else setStep("result");
        }
      }

      function toggleCheck(i) {
        const nc = [...checkItems];
        nc[i] = { ...nc[i], checked: !nc[i].checked };
        setCheckItems(nc);
      }

      const quizCorrect = answers.filter((a, i) => a === questions[i]?.ans).length;
      const quizPct = questions.length > 0 ? Math.round((quizCorrect / questions.length) * 100) : 100;
      const checkDone = checkItems.filter(c => c.checked).length;
      const checkPct = checkItems.length > 0 ? Math.round((checkDone / checkItems.length) * 100) : 100;
      const suggestedLevel = calcLevel(quizPct, checkPct);
      const lm = LEVEL_META[suggestedLevel];
      const currentLevel = targetEmp?.skills?.[selSub] || 0;

      async function saveResult() {
        if (!targetEmp || !selSub) return;
        setSaving(true);
        await uSk(selectedEmpId, selSub, suggestedLevel);
        setSaving(false);
        setSaved(true);
      }

      const cardStyle = { background: dark ? "#1e293b" : "#fff", borderRadius: 16, border: "1px solid var(--bd)", padding: 24 };

      return <div style={{ maxWidth: 640, margin: "0 auto", display: "flex", flexDirection: "column", gap: 16 }}>

        {/* Header */}
        <div style={{ ...cardStyle, padding: "16px 24px", display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 24 }}>🎯</span>
          <div>
            <div style={{ fontWeight: 800, fontSize: 16 }}>{isL ? "Đánh giá Kỹ năng" : "Skill-Bewertung"}</div>
            <div style={{ fontSize: 12, color: "var(--tx2)" }}>{isL ? "Quiz + Tự đánh giá thực tế" : "Quiz + Selbsteinschätzung"}</div>
          </div>
          {step !== "select" && <button onClick={() => { setStep("select"); setSaved(false); }} style={{ marginLeft: "auto", background: "none", border: "1px solid var(--bd)", borderRadius: 8, padding: "4px 12px", fontSize: 12, cursor: "pointer", color: "var(--tx2)" }}>← {isL ? "Quay lại" : "Zurück"}</button>}
        </div>

        {/* STEP: SELECT */}
        {step === "select" && <div style={cardStyle}>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {role !== "self" && <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: "var(--tx2)", display: "block", marginBottom: 6 }}>{isL ? "Nhân viên" : "Mitarbeiter"}</label>
              <select value={selectedEmpId} onChange={e => setSelectedEmpId(e.target.value)} style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid var(--bd)", fontSize: 13, background: "var(--bg)", color: "var(--tx)" }}>
                <option value="">– {isL ? "Chọn" : "Auswählen"} –</option>
                {emps.map(e => <option key={e.id} value={e.id}>{e.name} ({e.focus})</option>)}
              </select>
            </div>}

            {role === "self" && targetEmp && <div style={{ background: "var(--bg)", borderRadius: 10, padding: "10px 14px", fontWeight: 600, fontSize: 13 }}>
              👤 {targetEmp.name}
            </div>}

            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: "var(--tx2)", display: "block", marginBottom: 6 }}>{isL ? "Nhóm kỹ năng" : "Cluster"}</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {Object.entries(CL).map(([k, c]) => <button key={k} onClick={() => { setSelCluster(k); setSelSub(""); }} style={{ padding: "5px 10px", borderRadius: 8, border: selCluster === k ? `2px solid ${c.color}` : "1px solid var(--bd)", background: selCluster === k ? `${c.color}15` : "transparent", color: selCluster === k ? c.color : "var(--tx2)", fontWeight: 600, fontSize: 11, cursor: "pointer" }}>{c.icon} {c[lang] || c.de}</button>)}
              </div>
            </div>

            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: "var(--tx2)", display: "block", marginBottom: 6 }}>Subskill</label>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                {(CL[selCluster]?.subs || []).map(s => {
                  const hasQ = QUIZ[s.id] && QUIZ[s.id].length > 0;
                  const curLv = targetEmp?.skills?.[s.id] || 0;
                  const lmeta = LEVEL_META[curLv];
                  return <button key={s.id} onClick={() => setSelSub(s.id)} style={{ padding: "8px 10px", borderRadius: 10, border: selSub === s.id ? "2px solid var(--ac)" : "1px solid var(--bd)", background: selSub === s.id ? "rgba(37,99,235,.08)" : "transparent", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ fontWeight: 600, fontSize: 11, color: selSub === s.id ? "var(--ac)" : "var(--tx)" }}>{isL ? (s.vn || s.de) : s.de}</div>
                    <div style={{ display: "flex", gap: 4, marginTop: 3 }}>
                      {hasQ && <span style={{ fontSize: 9, background: "#eff6ff", color: "#2563eb", padding: "1px 5px", borderRadius: 4, fontWeight: 600 }}>Quiz</span>}
                      {curLv > 0 && <span style={{ fontSize: 9, background: `${lmeta.c}20`, color: lmeta.c, padding: "1px 5px", borderRadius: 4, fontWeight: 600 }}>{lmeta.emoji} {lmeta.l}</span>}
                    </div>
                  </button>;
                })}
              </div>
            </div>

            {sub && <div style={{ background: "var(--bg)", borderRadius: 10, padding: 12 }}>
              <div style={{ fontWeight: 700, fontSize: 13 }}>{sub.icon || CL[sub.ck]?.icon} {isL ? (sub.vn || sub.de) : sub.de}</div>
              <div style={{ fontSize: 11, color: "var(--tx2)", marginTop: 4 }}>{isL ? sub.bvn : sub.bde}</div>
              <div style={{ display: "flex", gap: 8, marginTop: 8, fontSize: 11 }}>
                {hasQuiz && <span style={{ color: "#2563eb" }}>✓ {questions.length || QUIZ[selSub]?.length} {isL ? "câu hỏi" : "Fragen"}</span>}
                {hasCheck && <span style={{ color: "#059669" }}>✓ {(CHECKLIST[selSub] || []).length} {isL ? "tiêu chí" : "Kriterien"}</span>}
              </div>
            </div>}

            <button onClick={startAssessment} disabled={!selSub || !selectedEmpId} style={{ padding: "12px 20px", borderRadius: 12, border: "none", background: (!selSub || !selectedEmpId) ? "#e2e8f0" : "var(--ac)", color: (!selSub || !selectedEmpId) ? "#94a3b8" : "#fff", fontWeight: 700, fontSize: 14, cursor: (!selSub || !selectedEmpId) ? "not-allowed" : "pointer" }}>
              {isL ? "🚀 Bắt đầu đánh giá" : "🚀 Bewertung starten"}
            </button>
          </div>
        </div>}

        {/* STEP: QUIZ */}
        {step === "quiz" && questions.length > 0 && (() => {
          const q = questions[qIdx];
          const progress = Math.round(((qIdx) / questions.length) * 100);
          return <div style={cardStyle}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 13 }}>📝 {isL ? `Câu ${qIdx + 1}/${questions.length}` : `Frage ${qIdx + 1}/${questions.length}`}</div>
              <div style={{ fontSize: 11, color: "var(--tx2)" }}>{isL ? "Quiz" : "Quiz"} {progress}%</div>
            </div>
            <div style={{ height: 4, background: "var(--bd)", borderRadius: 99, marginBottom: 20, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${progress}%`, background: "var(--ac)", transition: "width .3s" }} />
            </div>
            <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 16, lineHeight: 1.5 }}>{isL ? q.q.vn : q.q.de}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {(isL ? q.opts.vn : q.opts.de).map((opt, i) => {
                const selected = answers[qIdx] === i;
                return <button key={i} onClick={() => answerQ(i)} style={{ padding: "12px 16px", borderRadius: 10, border: selected ? "2px solid var(--ac)" : "1px solid var(--bd)", background: selected ? "rgba(37,99,235,.08)" : "transparent", textAlign: "left", cursor: "pointer", fontWeight: selected ? 700 : 400, color: selected ? "var(--ac)" : "var(--tx)", fontSize: 13, transition: "all .15s" }}>
                  <span style={{ fontWeight: 700, marginRight: 8, color: "var(--tx2)" }}>{String.fromCharCode(65 + i)}.</span>{opt}
                </button>;
              })}
            </div>
            <button onClick={nextQ} disabled={answers[qIdx] === null} style={{ marginTop: 16, width: "100%", padding: "12px", borderRadius: 12, border: "none", background: answers[qIdx] === null ? "#e2e8f0" : "var(--ac)", color: answers[qIdx] === null ? "#94a3b8" : "#fff", fontWeight: 700, fontSize: 14, cursor: answers[qIdx] === null ? "not-allowed" : "pointer" }}>
              {qIdx < questions.length - 1 ? (isL ? "Tiếp →" : "Weiter →") : (isL ? "Xong Quiz →" : "Quiz abschließen →")}
            </button>
          </div>;
        })()}

        {/* STEP: CHECKLIST */}
        {step === "check" && <div style={cardStyle}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>✅ {isL ? "Tự đánh giá thực tế" : "Selbsteinschätzung"}</div>
          <div style={{ fontSize: 12, color: "var(--tx2)", marginBottom: 16 }}>{isL ? "Tick những gì bạn tự tin có thể thực hiện được:" : "Kreuze an, was du sicher ausführen kannst:"}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {checkItems.map((item, i) => <div key={i} onClick={() => toggleCheck(i)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 10, border: item.checked ? "2px solid #059669" : "1px solid var(--bd)", background: item.checked ? "rgba(5,150,105,.06)" : "transparent", cursor: "pointer", transition: "all .15s" }}>
              <div style={{ width: 20, height: 20, borderRadius: 6, border: item.checked ? "2px solid #059669" : "2px solid var(--bd)", background: item.checked ? "#059669" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                {item.checked && <span style={{ color: "#fff", fontSize: 12, fontWeight: 700 }}>✓</span>}
              </div>
              <span style={{ fontSize: 13, fontWeight: item.checked ? 600 : 400, color: item.checked ? "#059669" : "var(--tx)" }}>{isL ? item.vn : item.de}</span>
            </div>)}
          </div>
          <div style={{ marginTop: 12, fontSize: 12, color: "var(--tx2)", textAlign: "right" }}>{checkDone}/{checkItems.length} {isL ? "tiêu chí" : "Kriterien"}</div>
          <button onClick={() => setStep("result")} style={{ marginTop: 16, width: "100%", padding: "12px", borderRadius: 12, border: "none", background: "var(--ac)", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
            {isL ? "Xem kết quả →" : "Ergebnis ansehen →"}
          </button>
        </div>}

    /* ═══════════════════ MAIN APP ═══════════════════ */
    function App() {

                  <input id="nc_icon" placeholder="🍣" style={{ fontSize: 11, padding: "6px 8px", borderRadius: 6, border: "1px solid var(--bd)", background: "transparent", color: "var(--tx)", textAlign: "center" }} />
                  <div style={{ display: "flex", gap: 4 }}>
                    <Bt small primary onClick={() => { const key = document.getElementById('nc_key').value.trim().replace(/\s+/g,'_'); const de = document.getElementById('nc_de').value.trim(); if(!key||!de){alert('Key + Name DE pflicht!');return;} if(CL[key]){alert('Key existiert!');return;} const n={...CL}; n[key]={de,vn:document.getElementById('nc_vn').value.trim()||de,icon:document.getElementById('nc_icon').value.trim()||'📦',color:'#6366f1',subs:[]}; clUpdate(n); setAddCluster(false); }}>✓</Bt>
                    <Bt small onClick={() => setAddCluster(false)}>✕</Bt>
                  </div>
                </div>
              </div>}
            </div>}

            {/* --- SUBSKILLS TAB --- */}
            {stab === "subskills" && <div className="dark-card" style={{ background: dark ? "#1e293b" : "#fff", borderRadius: 12, border: "1px solid var(--bd)", overflow: "hidden" }}>
              <div style={{ padding: "12px 18px", borderBottom: "1px solid var(--bd)", fontWeight: 700, fontSize: 14 }}>🔧 Subskills verwalten</div>
              <div style={{ padding: 18 }}>
                {Object.entries(CL).map(([ck, c]) => <div key={ck+clVer} style={{ marginBottom: 22 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}><span style={{ fontSize: 16 }}>{c.icon}</span><span style={{ fontWeight: 700, fontSize: 13, color: c.color }}>{clLabel(c)}</span><span style={{ fontSize: 10, color: "var(--tx2)", background: dark ? "#334155" : "#f1f5f9", padding: "2px 8px", borderRadius: 6 }}>{c.subs.length}</span><Bt small primary onClick={() => setAddSubCk(addSubCk===ck?null:ck)} style={{marginLeft:'auto',fontSize:10}}>+ Subskill</Bt></div>
                  <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, minWidth: 800 }}><thead><tr style={{ background: dark ? "#334155" : "#f8fafc" }}>
                    <th style={{ textAlign: "left", padding: "5px 8px", fontWeight: 700, borderBottom: "2px solid var(--bd)", width: 25, fontSize: 10 }}>#</th>
                    <th style={{ textAlign: "left", padding: "5px 8px", fontWeight: 700, borderBottom: "2px solid var(--bd)", fontSize: 10, width: 100 }}>ID</th>
                    <th style={{ textAlign: "left", padding: "5px 8px", fontWeight: 700, borderBottom: "2px solid var(--bd)", fontSize: 10 }}>DE</th>
                    <th style={{ textAlign: "left", padding: "5px 8px", fontWeight: 700, borderBottom: "2px solid var(--bd)", fontSize: 10 }}>VN</th>
                    <th style={{ textAlign: "center", padding: "5px 8px", fontWeight: 700, borderBottom: "2px solid var(--bd)", fontSize: 10, width: 65 }}>Lv</th>
                    <th style={{ textAlign: "left", padding: "5px 8px", fontWeight: 700, borderBottom: "2px solid var(--bd)", fontSize: 10 }}>Beschr. DE</th>
                    <th style={{ textAlign: "left", padding: "5px 8px", fontWeight: 700, borderBottom: "2px solid var(--bd)", fontSize: 10 }}>Beschr. VN</th>
                    <th style={{ width: 25 }}></th>
                  </tr></thead><tbody>{c.subs.map((sub, si) => {
                    const sl = SLVL[sub.lv] || SLVL[1];
                    const updSub = (field, val) => { const n = JSON.parse(JSON.stringify(CL)); const s = n[ck].subs.find(x=>x.id===sub.id); if(s){s[field]=field==='lv'?parseInt(val):val;} clUpdate(n); };
                    return <tr key={sub.id}>
                      <td style={{ padding: "4px 8px", borderBottom: "1px solid var(--bd)", color: "var(--tx2)", fontSize: 10 }}>{si + 1}</td>
                      <td style={{ padding: "4px 8px", borderBottom: "1px solid var(--bd)", fontFamily: "monospace", fontSize: 9, color: "var(--tx2)" }}>{sub.id}</td>
                      <td style={{ padding: "4px 8px", borderBottom: "1px solid var(--bd)" }}><input defaultValue={sub.de} onBlur={e=>updSub('de',e.target.value)} style={{ width: "100%", fontSize: 10, background: "transparent", border: "1px solid var(--bd)", borderRadius: 4, padding: "3px 6px", color: "var(--tx)", fontWeight: 600 }} /></td>
                      <td style={{ padding: "4px 8px", borderBottom: "1px solid var(--bd)" }}><input defaultValue={sub.vn} onBlur={e=>updSub('vn',e.target.value)} style={{ width: "100%", fontSize: 10, background: "transparent", border: "1px solid var(--bd)", borderRadius: 4, padding: "3px 6px", color: "var(--tx)" }} /></td>
                      <td style={{ padding: "4px 8px", borderBottom: "1px solid var(--bd)", textAlign: "center" }}><select value={sub.lv} onChange={e=>updSub('lv',e.target.value)} style={{ fontSize: 10, padding: "2px 4px", borderRadius: 4, border: "1px solid var(--bd)", background: sl.c+'22', color: sl.c, fontWeight: 700, cursor: "pointer" }}>{[1,2,3,4].map(v=><option key={v} value={v}>{SLVL[v].i} {v}</option>)}</select></td>
                      <td style={{ padding: "4px 8px", borderBottom: "1px solid var(--bd)" }}><input defaultValue={sub.bde||''} onBlur={e=>updSub('bde',e.target.value)} style={{ width: "100%", fontSize: 9, background: "transparent", border: "1px solid var(--bd)", borderRadius: 4, padding: "3px 6px", color: "var(--tx2)" }} /></td>
                      <td style={{ padding: "4px 8px", borderBottom: "1px solid var(--bd)" }}><input defaultValue={sub.bvn||''} onBlur={e=>updSub('bvn',e.target.value)} style={{ width: "100%", fontSize: 9, background: "transparent", border: "1px solid var(--bd)", borderRadius: 4, padding: "3px 6px", color: "var(--tx2)" }} /></td>
                      <td style={{ padding: "4px 8px", borderBottom: "1px solid var(--bd)" }}><button onClick={()=>{if(!confirm(`"${sub.de}" löschen?`))return;const n=JSON.parse(JSON.stringify(CL));n[ck].subs=n[ck].subs.filter(x=>x.id!==sub.id);clUpdate(n);}} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:12}}>×</button></td>
                    </tr>;
                  })}</tbody></table></div>
                  {addSubCk===ck && <div style={{ marginTop: 8, padding: 12, background: dark?"#334155":"#f8fafc", borderRadius: 8, border: "1px solid var(--bd)" }}>
                    <div style={{ fontWeight: 700, fontSize: 11, marginBottom: 8 }}>+ Neuer Subskill in {c.icon} {clLabel(c)}</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1.5fr 1.5fr 60px", gap: 6, marginBottom: 6 }}>
                      <input id={"ns_id_"+ck} placeholder="ID (z.B. new_skill)" style={{ fontSize: 10, padding: "5px 8px", borderRadius: 4, border: "1px solid var(--bd)", background: "transparent", color: "var(--tx)" }} />
                      <input id={"ns_de_"+ck} placeholder="Name DE" style={{ fontSize: 10, padding: "5px 8px", borderRadius: 4, border: "1px solid var(--bd)", background: "transparent", color: "var(--tx)" }} />
                      <input id={"ns_vn_"+ck} placeholder="Name VN" style={{ fontSize: 10, padding: "5px 8px", borderRadius: 4, border: "1px solid var(--bd)", background: "transparent", color: "var(--tx)" }} />
                      <select id={"ns_lv_"+ck} style={{ fontSize: 10, padding: "5px 4px", borderRadius: 4, border: "1px solid var(--bd)", background: "transparent", color: "var(--tx)" }}>{[1,2,3,4].map(v=><option key={v} value={v}>Lv{v}</option>)}</select>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 80px", gap: 6 }}>
                      <input id={"ns_bde_"+ck} placeholder="Beschreibung DE" style={{ fontSize: 10, padding: "5px 8px", borderRadius: 4, border: "1px solid var(--bd)", background: "transparent", color: "var(--tx)" }} />
                      <input id={"ns_bvn_"+ck} placeholder="Beschreibung VN" style={{ fontSize: 10, padding: "5px 8px", borderRadius: 4, border: "1px solid var(--bd)", background: "transparent", color: "var(--tx)" }} />
                      <div style={{ display: "flex", gap: 4 }}>
                        <Bt small primary onClick={()=>{ const id=document.getElementById('ns_id_'+ck).value.trim().replace(/\s+/g,'_'); const de=document.getElementById('ns_de_'+ck).value.trim(); if(!id||!de){alert('ID + Name DE pflicht!');return;} if(ALL_IDS.includes(id)){alert('ID existiert bereits!');return;} const n=JSON.parse(JSON.stringify(CL)); n[ck].subs.push({id,de,vn:document.getElementById('ns_vn_'+ck).value.trim()||de,lv:parseInt(document.getElementById('ns_lv_'+ck).value),bde:document.getElementById('ns_bde_'+ck).value.trim(),bvn:document.getElementById('ns_bvn_'+ck).value.trim()}); clUpdate(n); setAddSubCk(null); }}>✓</Bt>
                        <Bt small onClick={()=>setAddSubCk(null)}>✕</Bt>
                      </div>
                    </div>
                  </div>}
                </div>)}
                <div style={{ marginTop: 10, fontSize: 10, color: "#94a3b8" }}>🔥 Alle Änderungen werden sofort in Supabase gespeichert</div>
              </div>
            </div>}

            {/* --- VISIBILITY TAB --- */}
            {stab === "visibility" && <div className="dark-card" style={{ background: dark ? "#1e293b" : "#fff", borderRadius: 12, border: "1px solid var(--bd)", overflow: "hidden" }}>
              <div style={{ padding: "12px 18px", borderBottom: "1px solid var(--bd)", fontWeight: 700, fontSize: 14 }}>👁 Sichtbarkeit & 📚 Tutorials</div>
              <div style={{ padding: 18 }}>
                <div style={{ fontSize: 11, color: "var(--tx2)", marginBottom: 14, padding: "8px 12px", borderRadius: 8, background: dark ? "#334155" : "#f8fafc", lineHeight: 1.6 }}>
                  <b>Sichtbar für:</b> Wähle pro Skill, welche Berater ihn sehen. Leer = alle.<br />
                  <span style={{ fontSize: 10, color: "#94a3b8" }}>🔥 Alles in Firebase Firestore gespeichert – sofort synchronisiert</span>
                </div>
                {Object.entries(CL).map(([ck, c]) => <div key={ck} style={{ marginBottom: 22 }}>
                  <div style={{ fontWeight: 700, fontSize: 12, color: c.color, marginBottom: 8 }}>{c.icon} {c.label}</div>
                  <div style={{ overflowX: "auto" }}><table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, minWidth: 600 }}><thead><tr style={{ background: dark ? "#334155" : "#f8fafc" }}>
                    <th style={{ textAlign: "left", padding: "6px 10px", fontWeight: 700, borderBottom: "2px solid var(--bd)", minWidth: 130 }}>Subskill</th>
                    <th style={{ textAlign: "center", padding: "6px 10px", fontWeight: 700, borderBottom: "2px solid var(--bd)" }}>Sichtbar für</th>
                    <th style={{ textAlign: "center", padding: "6px 10px", fontWeight: 700, borderBottom: "2px solid var(--bd)", width: 50 }}>📚</th>
                    <th style={{ padding: "6px 10px", borderBottom: "2px solid var(--bd)", width: 50 }}></th>
                  </tr></thead><tbody>{c.subs.map(sub => {
                    const tuts = tutsFor(sub.id); const vt = gVT(sub.id); const allV = vt.length === 0; return <tr key={sub.id}>
                      <td style={{ padding: "7px 10px", borderBottom: "1px solid var(--bd)", fontWeight: 500 }}>{sub.name}</td>
                      <td style={{ padding: "7px 10px", borderBottom: "1px solid var(--bd)" }}><div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                        <button onClick={() => setVisAll(sub.id)} style={{ padding: "3px 8px", borderRadius: 6, border: allV ? "2px solid var(--ac)" : "1px solid var(--bd)", background: allV ? "rgba(37,99,235,.08)" : "#fff", fontSize: 10, fontWeight: 600, cursor: "pointer", color: allV ? "var(--ac)" : "var(--tx2)" }}>👥 Alle</button>
                        <span style={{ width: 1, height: 16, background: "var(--bd)" }} />
                        {emps.map(emp => { const explicit = vt.includes(emp.id); return <button key={emp.id} onClick={() => { if (allV) { const ids = emps.map(e => e.id).filter(id => id !== emp.id); saveCfg({ ...cfg, [sub.id]: { ...(cfg[sub.id] || {}), visibleTo: ids } }); } else toggleVis(sub.id, emp.id); }} style={{ padding: "2px 8px", borderRadius: 6, fontSize: 10, fontWeight: 600, cursor: "pointer", border: explicit ? "2px solid var(--ac)" : allV ? "1px solid #d4d4d4" : "1px solid var(--bd)", background: explicit ? "rgba(37,99,235,.1)" : allV ? "#f8fafc" : "#fff", color: explicit ? "var(--ac)" : allV ? "#94a3b8" : "var(--tx2)", opacity: !allV && !explicit ? 0.4 : 1 }}>{emp.avatar}</button>; })}
                      </div></td>
                      <td style={{ padding: "7px 10px", borderBottom: "1px solid var(--bd)", textAlign: "center" }}>{tuts.length > 0 ? <button onClick={() => setShTut(sub.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#6366f1", fontWeight: 700, fontSize: 12 }}>{tuts.length} 📚</button> : <span style={{ color: "#cbd5e1" }}>0</span>}</td>
                      <td style={{ padding: "7px 10px", borderBottom: "1px solid var(--bd)", textAlign: "center" }}><Bt small onClick={() => { setTutSk(sub.id); tRef.current?.click(); }} style={{ fontSize: 10, padding: "3px 8px" }}>📚+</Bt></td>
                    </tr>;
                  })}</tbody></table></div>
                </div>)}
              </div>
            </div>}

          </div>}

        </div>

        {/* MODALS */}
        <Md open={shAE} onClose={() => setShAE(false)} title="Neuer Berater"><div style={{ display: "flex", flexDirection: "column", gap: 14 }}><Ip label="Name" value={nE.name} onChange={e => setNE(p => ({ ...p, name: e.target.value }))} /><Ip label="Fokus" value={nE.focus} onChange={e => setNE(p => ({ ...p, focus: e.target.value }))} /><Sl label="Rolle" value={nE.role} onChange={e => setNE(p => ({ ...p, role: e.target.value }))}>{Object.entries(RL).map(([k, r]) => <option key={k} value={k}>{r.i} {r.l}</option>)}</Sl><div style={{ display: "flex", gap: 8 }}><Bt style={{ flex: 1 }} onClick={() => setShAE(false)}>{t.cancel}</Bt><Bt primary style={{ flex: 1 }} onClick={aE}>{t.create}</Bt></div></div></Md>
        <Md open={shAU} onClose={() => setShAU(false)} title="Neuer Zugang"><div style={{ display: "flex", flexDirection: "column", gap: 14 }}><Ip label="Name (=Login)" value={nU.name} onChange={e => setNU(p => ({ ...p, name: e.target.value }))} /><Ip label="Passwort" type="password" value={nU.password} onChange={e => setNU(p => ({ ...p, password: e.target.value }))} /><Sl label="Rolle" value={nU.role} onChange={e => setNU(p => ({ ...p, role: e.target.value }))}>{Object.entries(RL).map(([k, r]) => <option key={k} value={k}>{r.i} {r.l}</option>)}</Sl><Sl label="Berater" value={nU.locs} onChange={e => setNU(p => ({ ...p, locs: e.target.value }))}><option value="">–</option>{emps.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</Sl><div style={{ display: "flex", gap: 8 }}><Bt style={{ flex: 1 }} onClick={() => setShAU(false)}>Abbrechen</Bt><Bt primary style={{ flex: 1 }} onClick={aU}>{t.create}</Bt></div></div></Md>
        <Md open={shG && !!sE} onClose={() => setShG(false)} title="Ziel"><div style={{ display: "flex", flexDirection: "column", gap: 14 }}><Sl label="Skill" value={nG.skill} onChange={e => setNG(p => ({ ...p, skill: e.target.value }))}><option value="">–</option>{Object.entries(CL).map(([k, c]) => <optgroup key={k} label={`${c.icon} ${c.label}`}>{c.subs.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</optgroup>)}</Sl><Sl label="Ziel" value={nG.target} onChange={e => setNG(p => ({ ...p, target: +e.target.value }))}>{LV.filter(l => l.v > 0).map(l => <option key={l.v} value={l.v}>{l.v} – {l.l}</option>)}</Sl><Ip label="Frist" type="date" value={nG.deadline} onChange={e => setNG(p => ({ ...p, deadline: e.target.value }))} /><Ip label="Notiz" value={nG.note} onChange={e => setNG(p => ({ ...p, note: e.target.value }))} /><div style={{ display: "flex", gap: 8 }}><Bt style={{ flex: 1 }} onClick={() => setShG(false)}>Abbrechen</Bt><Bt primary style={{ flex: 1 }} onClick={() => sE && aG(sE.id)}>{t.save}</Bt></div></div></Md>
        <Md open={!!pwMod} onClose={() => { setPwMod(null); setNewPw(""); setPwMsg(""); }} title={`🔑 Passwort: ${pwMod?.name || ""}`} width={400}>
          {pwMod && <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Ip label="Neues Passwort" type="text" value={newPw} onChange={e => setNewPw(e.target.value)} onKeyDown={e => e.key === "Enter" && changePw()} />
            {pwMsg && <div style={{ fontSize: 12, fontWeight: 600, color: "var(--ok)" }}>{pwMsg}</div>}
            <div style={{ fontSize: 10, color: "var(--tx2)" }}>Wird sofort in Firebase gespeichert.</div>
            <div style={{ display: "flex", gap: 8 }}><Bt style={{ flex: 1 }} onClick={() => setPwMod(null)}>Abbrechen</Bt><Bt primary style={{ flex: 1 }} onClick={changePw} disabled={!newPw.trim()}>Ändern</Bt></div>
          </div>}
        </Md>
        <Md open={!!shDoc} onClose={() => setShDoc(null)} title={`📎 Docs: ${shDoc ? sL(shDoc.s) : ""}`} width={520}>
          {shDoc && (() => {
            const docs = docsFor(shDoc.e, shDoc.s); const du = cuD(shDoc.e); return <div>
              {docs.length === 0 && <div style={{ color: "var(--tx2)", fontSize: 13, padding: "10px 0" }}>{t.noDocs}</div>}
              {docs.map(d => <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderBottom: "1px solid #f8fafc" }}>
                <span style={{ fontSize: 18 }}>{d.mimeType?.includes("pdf") ? "📄" : "📁"}</span>
                <div style={{ flex: 1 }}><div style={{ fontSize: 12, fontWeight: 500 }}>{d.fileName}</div><div style={{ fontSize: 10, color: "var(--tx2)" }}>{new Date(d.uploadedAt).toLocaleDateString("de-DE")}</div></div>
                <Bt small onClick={() => window.open(d.downloadUrl, '_blank')}>Öffnen</Bt>
                {du && <button onClick={() => delFile(d)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--danger)", fontSize: 15 }}>×</button>}
              </div>)}
              {du && <div style={{ marginTop: 10 }}><Bt small primary onClick={() => { setUpCtx({ e: shDoc.e, s: shDoc.s }); fRef.current?.click(); }}>+ {t.upload}</Bt></div>}
              <div style={{ marginTop: 12, fontSize: 10, color: "#94a3b8" }}>🔥 Firebase Storage</div>
            </div>;
          })()}
        </Md>
        <Md open={!!shTut} onClose={() => setShTut(null)} title={`📚 Tutorials: ${shTut ? sL(shTut) : ""}`} width={520}>
          {shTut && (() => {
            const tuts = tutsFor(shTut); return <div>
              {tuts.length === 0 && <div style={{ color: "var(--tx2)", fontSize: 13, padding: "10px 0" }}>{t.noTuts}</div>}
              {tuts.map(d => <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderBottom: "1px solid #f8fafc" }}>
                <span style={{ fontSize: 18 }}>{d.mimeType?.includes("pdf") ? "📄" : d.mimeType?.includes("video") ? "🎬" : "📁"}</span>
                <div style={{ flex: 1 }}><div style={{ fontSize: 12, fontWeight: 500 }}>{d.fileName}</div><div style={{ fontSize: 10, color: "var(--tx2)" }}>{new Date(d.uploadedAt).toLocaleDateString("de-DE")}</div></div>
                <Bt small onClick={() => window.open(d.downloadUrl, '_blank')}>Öffnen</Bt>
                {role === "admin" && <button onClick={() => delFile(d)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--danger)", fontSize: 15 }}>×</button>}
              </div>)}
              {role === "admin" && <div style={{ marginTop: 10 }}><Bt small primary onClick={() => { setTutSk(shTut); tRef.current?.click(); }}>+ Tutorial</Bt></div>}
              <div style={{ marginTop: 12, fontSize: 10, color: "#94a3b8" }}>🔥 Firebase Storage</div>
            </div>;
          })()}
        </Md>

        <input ref={fRef} type="file" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx,.pptx,.txt,.csv" style={{ display: "none" }} onChange={e => { if (e.target.files[0] && upCtx) handleUpload(e.target.files[0], 'doc', upCtx.e, upCtx.s); e.target.value = ""; }} />
        <input ref={tRef} type="file" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx,.pptx,.txt,.csv,.mp4,.mov" style={{ display: "none" }} onChange={e => { if (e.target.files[0] && tutSk) handleUpload(e.target.files[0], 'tutorial', '', tutSk); e.target.value = ""; }} />
      </div>;
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>

</html>
